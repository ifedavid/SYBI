name: Deployment on merge with main
run-name: Trigger deploymeny by {{ github.actor }}
on: 
  pull_request_target:
    types: [closed]
    branches:
      - main
jobs:
  check-for-updates:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code and switch to main branch
        uses: actions/checkout@v4
      - name: Fetch cksum number for index.html on dev branch
        id: fetch_dev_cksum
        run: |
          echo "dev_index_cksum=$(cksum index.html | awk '{print $1}')" >> $GITHUB_OUTPUT
      - name: Checkout to main and fetch cksum number for index.html on main branch
        id: fetch_main_cksum
        run: |
          git fetch origin main
          git checkout main
          echo "main_index_cksum=$(cksum index.html | awk '{print $1}')" >> $GITHUB_OUTPUT
      - run: echo "🍏 This job's status is ${{ job.status }}."
  
  deploy:
    if: steps.fetch_dev_cksum.outputs.dev_index_cksum != steps.fetch_main_cksum.outputs.main_index_cksum
    runs-on: ubuntu-latest
    steps:
      - name: Check out to branch that triggered the workflow
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Push changes to gh-pages branch
        run: |
          git push origin HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
